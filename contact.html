<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - MétéoPop</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container nav">
      <div class="brand">
        <img src="assets/img/logo-meteopop.png" alt="Logo MétéoPop">
      </div>
      <nav class="nav-links" aria-label="Navigation principale">
        <a href="index.html">La prog</a>
        <a href="infos-pratiques.html">Infos pratiques</a>
        <a href="programmation.html">Programmation</a>
        <a class="btn-ticket" href="billetterie.html">Billetterie</a>
      </nav>
    </div>
  </header>

  <!-- Section Contact -->
  <section class="section">
    <h2>Contactez-nous</h2>
    <form class="contact-form">
      <div class="form-group">
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required>
      </div>
      <div class="form-group">
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message :</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-submit">Envoyer</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-inner container">
      <a href="contact.html">Contact</a>
      <p>&copy; 2026 MétéoPop. Tous droits réservés.</p>
    </div>
  </footer>
</body>
</html>
